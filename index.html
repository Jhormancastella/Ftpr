<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Fondo Virtual Pro - Cámara IA</title>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --primary: #e94560;
            --primary-dark: #c73a52;
            --bg-dark: #0a0a1a;
            --bg-card: #12122a;
            --bg-surface: #1a1a3e;
            --border: #2a2a5e;
            --text: #e0e0ff;
            --text-muted: #8888aa;
            --success: #2ecc71;
            --warning: #f39c12;
            --error: #ff4757;
            --radius: 16px;
            --shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== MODO PC ===== */
        body.desktop-mode {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }

        body.desktop-mode .app-container {
            max-width: 1400px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 20px;
            align-items: start;
        }

        body.desktop-mode .main-area {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
        }

        body.desktop-mode .sidebar {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
            position: sticky;
            top: 20px;
        }

        /* ===== MODO MÓVIL ===== */
        body.mobile-mode {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
        }

        body.mobile-mode .app-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
        }

        body.mobile-mode .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background: #000;
        }

        body.mobile-mode .camera-wrapper {
            flex: 1;
            width: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            overflow: hidden;
        }

        body.mobile-mode #mainCanvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        body.mobile-mode .sidebar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 10, 26, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            border-radius: 20px 20px 0 0;
            padding: 16px;
            max-height: 60vh;
            overflow-y: auto;
            transform: translateY(calc(100% - 60px));
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
        }

        body.mobile-mode .sidebar.open {
            transform: translateY(0);
        }

        body.mobile-mode .sidebar-handle {
            display: flex;
            justify-content: center;
            padding-bottom: 12px;
            cursor: pointer;
        }

        body.mobile-mode .sidebar-handle::before {
            content: '';
            width: 40px;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
        }

        /* ===== HEADER ===== */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            z-index: 50;
        }

        .app-header h1 {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: var(--bg-surface);
            color: var(--text);
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .icon-btn:hover, .icon-btn:active {
            background: var(--primary);
            transform: scale(1.05);
        }

        .icon-btn.active {
            background: var(--primary);
            color: #fff;
        }

        /* ===== CAMERA WRAPPER PC ===== */
        body.desktop-mode .camera-wrapper {
            position: relative;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            width: 100%;
            aspect-ratio: 16 / 9;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body.desktop-mode #mainCanvas {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        #videoFeed { display: none; }

        /* ===== OVERLAYS ===== */
        .camera-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 12px;
        }

        .camera-overlay > * {
            pointer-events: auto;
        }

        .overlay-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .overlay-bottom {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 16px;
            padding-bottom: 8px;
        }

        /* Capture button mobile */
        .btn-shutter {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 4px solid rgba(255,255,255,0.3);
            background: var(--primary);
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            box-shadow: 0 4px 20px rgba(233, 69, 96, 0.4);
        }

        .btn-shutter:active {
            transform: scale(0.9);
            box-shadow: 0 2px 10px rgba(233, 69, 96, 0.3);
        }

        .btn-shutter:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ===== SECTIONS ===== */
        .section {
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 12px;
            font-weight: 600;
        }

        /* ===== SELECTOR DE CÁMARA ===== */
        .camera-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            overflow-x: auto;
            padding-bottom: 4px;
            scrollbar-width: none;
        }

        .camera-selector::-webkit-scrollbar { display: none; }

        .cam-chip {
            flex-shrink: 0;
            padding: 8px 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--bg-surface);
            color: var(--text);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .cam-chip:hover {
            border-color: var(--primary);
        }

        .cam-chip.active {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }

        /* ===== CONTROLES ===== */
        .control-group {
            margin-bottom: 16px;
        }

        .control-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .control-value {
            color: var(--text);
            font-weight: 600;
        }

        input[type="range"] {
            width: 100%;
            -webkit-appearance: none;
            appearance: none;
            height: 6px;
            border-radius: 3px;
            background: var(--bg-surface);
            outline: none;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
            border: 2px solid #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
            border: 2px solid #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        input[type="range"]:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ===== BOTONES DE ACCIÓN ===== */
        .btn-primary {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: var(--primary);
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--bg-surface);
            color: var(--text);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .btn-secondary:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* ===== FONDO ===== */
        .bg-options {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }

        .bg-color-swatch {
            aspect-ratio: 1;
            border-radius: 10px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .bg-color-swatch:hover {
            transform: scale(1.05);
        }

        .bg-color-swatch.active {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px var(--primary);
        }

        .bg-color-swatch.checkered {
            background: 
                linear-gradient(45deg, #333 25%, transparent 25%),
                linear-gradient(-45deg, #333 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #333 75%),
                linear-gradient(-45deg, transparent 75%, #333 75%);
            background-size: 10px 10px;
            background-position: 0 0, 0 5px, 5px -5px, -5px 0px;
            background-color: #666;
        }

        .upload-area {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .upload-area:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .upload-area input { display: none; }

        /* ===== STATUS ===== */
        #statusMsg {
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-info { background: rgba(136, 170, 255, 0.1); color: #88aaff; }
        .status-success { background: rgba(46, 204, 113, 0.15); color: var(--success); }
        .status-error { background: rgba(255, 71, 87, 0.15); color: var(--error); border: 1px solid rgba(255, 71, 87, 0.3); }
        .status-warning { background: rgba(243, 156, 18, 0.15); color: var(--warning); }

        /* ===== DOWNLOADS ===== */
        .download-section {
            display: none;
            gap: 12px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .download-section.show {
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        .download-card {
            background: var(--bg-surface);
            border-radius: 12px;
            overflow: hidden;
            text-align: center;
        }

        .download-card img {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            display: block;
            background: #222;
        }

        .download-card a {
            display: block;
            padding: 10px;
            color: var(--primary);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* ===== FULLSCREEN ===== */
        body.mobile-mode.fullscreen .app-header {
            display: none;
        }

        body.mobile-mode.fullscreen .sidebar {
            display: none;
        }

        body.mobile-mode.fullscreen .camera-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            z-index: 9999;
        }

        /* Botón flotante para salir de fullscreen */
        .exit-fs-btn {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 10000;
            display: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            color: #fff;
            font-size: 1.2rem;
            cursor: pointer;
        }

        body.mobile-mode.fullscreen .exit-fs-btn {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ===== TOGGLE PC/MOBILE ===== */
        .toggle-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .toggle-btn {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg-surface);
            color: var(--text-muted);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .toggle-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }

        /* ===== RESPONSIVE PC ===== */
        @media (max-width: 900px) {
            body.desktop-mode .app-container {
                grid-template-columns: 1fr;
            }
            body.desktop-mode .sidebar {
                position: static;
            }
        }

        /* ===== ANIMACIONES ===== */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .recording-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--error);
            animation: pulse 1.5s infinite;
        }

        /* ===== LOADING SPINNER ===== */
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: rgba(0,0,0,0.7);
            z-index: 10;
        }

        .loading-overlay p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* ===== HIDDEN ===== */
        .hidden { display: none !important; }
    </style>
</head>
<body class="desktop-mode">

    <button class="exit-fs-btn" id="exitFsBtn" title="Salir de pantalla completa">✕</button>

    <div class="app-container">
        <!-- ÁREA PRINCIPAL -->
        <div class="main-area">
            <div class="app-header">
                <h1>🎥 Fondo Virtual Pro</h1>
                <div class="header-actions">
                    <button class="icon-btn" id="rotateBtn" title="Rotar pantalla">🔄</button>
                    <button class="icon-btn" id="fullscreenBtn" title="Pantalla completa">⛶</button>
                </div>
            </div>

            <div class="camera-wrapper" id="cameraWrapper">
                <canvas id="mainCanvas" width="1280" height="720"></canvas>
                <video id="videoFeed" width="1280" height="720" autoplay playsinline muted></video>

                <div class="loading-overlay" id="loadingOverlay">
                    <div class="spinner"></div>
                    <p id="loadingText">Iniciando cámara...</p>
                </div>

                <div class="camera-overlay" id="cameraOverlay">
                    <div class="overlay-top">
                        <div style="display:flex;align-items:center;gap:6px;background:rgba(0,0,0,0.5);padding:6px 12px;border-radius:20px;font-size:0.75rem;">
                            <div class="recording-dot" id="recordingDot"></div>
                            <span id="fpsCounter">-- fps</span>
                        </div>
                        <div style="display:flex;gap:6px;">
                            <button class="icon-btn" id="mobileSwitchCam" title="Cambiar cámara" style="display:none;width:36px;height:36px;font-size:1rem;">🔄</button>
                        </div>
                    </div>
                    <div class="overlay-bottom" id="mobileControls" style="display:none;">
                        <button class="icon-btn" id="mobileSettingsBtn" title="Ajustes">⚙️</button>
                        <button class="btn-shutter" id="mobileCaptureBtn" disabled>📸</button>
                        <button class="icon-btn" id="mobileBgBtn" title="Fondos">🖼️</button>
                    </div>
                </div>
            </div>

            <!-- Status -->
            <div id="statusMsg" class="status-info" style="margin-top:12px;">⏳ Verificando entorno...</div>
        </div>

        <!-- SIDEBAR / PANEL DE CONTROLES -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-handle" id="sidebarHandle"></div>

            <!-- Selector de Cámara -->
            <div class="section">
                <div class="section-title">📷 Cámaras disponibles</div>
                <div class="camera-selector" id="cameraSelector">
                    <div class="cam-chip active" data-device="default">🎥 Default</div>
                </div>
            </div>

            <!-- Configuración de Cámara (Avanzada) -->
            <div class="section" id="cameraSettingsSection">
                <div class="section-title">⚙️ Configuración de cámara</div>

                <div class="control-group" id="zoomControl">
                    <div class="control-label">
                        <span>Zoom</span>
                        <span class="control-value" id="zoomValue">1.0x</span>
                    </div>
                    <input type="range" id="zoomSlider" min="1" max="10" step="0.1" value="1" disabled>
                </div>

                <div class="control-group" id="isoControl">
                    <div class="control-label">
                        <span>ISO</span>
                        <span class="control-value" id="isoValue">Auto</span>
                    </div>
                    <input type="range" id="isoSlider" min="50" max="3200" step="50" value="100" disabled>
                </div>

                <div class="control-group" id="exposureControl">
                    <div class="control-label">
                        <span>Exposición</span>
                        <span class="control-value" id="exposureValue">0</span>
                    </div>
                    <input type="range" id="exposureSlider" min="-10" max="10" step="0.5" value="0" disabled>
                </div>

                <div class="control-group" id="wbControl">
                    <div class="control-label">
                        <span>Balance de blancos</span>
                        <span class="control-value" id="wbValue">Auto</span>
                    </div>
                    <input type="range" id="wbSlider" min="2500" max="9000" step="100" value="4500" disabled>
                </div>

                <div class="control-group" id="brightnessControl">
                    <div class="control-label">
                        <span>Brillo</span>
                        <span class="control-value" id="brightnessValue">0</span>
                    </div>
                    <input type="range" id="brightnessSlider" min="-100" max="100" step="1" value="0" disabled>
                </div>

                <div class="control-group" id="contrastControl">
                    <div class="control-label">
                        <span>Contraste</span>
                        <span class="control-value" id="contrastValue">0</span>
                    </div>
                    <input type="range" id="contrastSlider" min="-100" max="100" step="1" value="0" disabled>
                </div>

                <div class="toggle-row">
                    <button class="toggle-btn" id="torchBtn">🔦 Flash</button>
                    <button class="toggle-btn" id="focusBtn">🔍 Auto-focus</button>
                </div>
            </div>

            <!-- Fondo -->
            <div class="section">
                <div class="section-title">🎨 Fondo</div>
                <div class="bg-options" id="bgOptions">
                    <div class="bg-color-swatch active" data-color="#1a1a2e" style="background:#1a1a2e;" title="Azul oscuro"></div>
                    <div class="bg-color-swatch" data-color="#0a0a0a" style="background:#0a0a0a;" title="Negro"></div>
                    <div class="bg-color-swatch" data-color="#2d1b4e" style="background:#2d1b4e;" title="Púrpura"></div>
                    <div class="bg-color-swatch checkered" data-color="transparent" title="Transparente"></div>
                </div>
                <label class="upload-area" for="bgUpload">
                    🖼️ Subir imagen de fondo
                    <input type="file" id="bgUpload" accept="image/*" />
                </label>
            </div>

            <!-- Captura PC -->
            <div class="section" id="pcCaptureSection">
                <button class="btn-primary" id="captureBtn" disabled>
                    📸 Capturar foto
                </button>
            </div>

            <!-- Descargas -->
            <div class="download-section" id="downloadSection">
                <div class="download-card">
                    <img id="previewOriginal" src="" alt="Original" />
                    <a id="downloadOriginal" href="#" download="original_720p.jpg">Descargar Original</a>
                </div>
                <div class="download-card">
                    <img id="previewEdited" src="" alt="Editada" />
                    <a id="downloadEdited" href="#" download="editada_720p.jpg">Descargar Editada</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== VARIABLES GLOBALES ====================
        const video = document.getElementById('videoFeed');
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const statusMsg = document.getElementById('statusMsg');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const cameraWrapper = document.getElementById('cameraWrapper');
        const cameraOverlay = document.getElementById('cameraOverlay');
        const sidebar = document.getElementById('sidebar');
        const sidebarHandle = document.getElementById('sidebarHandle');
        const body = document.body;

        // Controles
        const captureBtn = document.getElementById('captureBtn');
        const mobileCaptureBtn = document.getElementById('mobileCaptureBtn');
        const bgUpload = document.getElementById('bgUpload');
        const cameraSelector = document.getElementById('cameraSelector');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const rotateBtn = document.getElementById('rotateBtn');
        const exitFsBtn = document.getElementById('exitFsBtn');
        const mobileSwitchCam = document.getElementById('mobileSwitchCam');
        const mobileSettingsBtn = document.getElementById('mobileSettingsBtn');
        const mobileBgBtn = document.getElementById('mobileBgBtn');
        const mobileControls = document.getElementById('mobileControls');
        const pcCaptureSection = document.getElementById('pcCaptureSection');
        const fpsCounter = document.getElementById('fpsCounter');
        const recordingDot = document.getElementById('recordingDot');

        // Sliders
        const zoomSlider = document.getElementById('zoomSlider');
        const isoSlider = document.getElementById('isoSlider');
        const exposureSlider = document.getElementById('exposureSlider');
        const wbSlider = document.getElementById('wbSlider');
        const brightnessSlider = document.getElementById('brightnessSlider');
        const contrastSlider = document.getElementById('contrastSlider');
        const torchBtn = document.getElementById('torchBtn');
        const focusBtn = document.getElementById('focusBtn');

        // State
        let backgroundImage = null;
        let bgColor = '#1a1a2e';
        let isModelReady = false;
        let isMobile = false;
        let currentStream = null;
        let currentDeviceId = null;
        let imageCapture = null;
        let track = null;
        let cameraCapabilities = {};
        let lastVideoFrame = null;
        let frameCount = 0;
        let lastFpsTime = performance.now();
        let isFullscreen = false;
        let isLandscape = false;
        let selfieSegmentation = null;
        let camera = null;
        let deviceList = [];

        const canvasWidth = 1280;
        const canvasHeight = 720;

        // ==================== DETECTAR DISPOSITIVO ====================
        function detectDevice() {
            const ua = navigator.userAgent;
            isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(ua);
            body.className = isMobile ? 'mobile-mode' : 'desktop-mode';

            if (isMobile) {
                mobileControls.style.display = 'flex';
                mobileSwitchCam.style.display = 'flex';
                pcCaptureSection.style.display = 'none';
                // Forzar landscape en móvil si es posible
                requestLandscape();
            } else {
                mobileControls.style.display = 'none';
                mobileSwitchCam.style.display = 'none';
                pcCaptureSection.style.display = 'block';
            }
        }

        // ==================== ORIENTACIÓN ====================
        function requestLandscape() {
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(() => {
                    console.log('No se pudo bloquear orientación');
                });
            }
        }

        function toggleOrientation() {
            if (screen.orientation && screen.orientation.lock) {
                const current = screen.orientation.type;
                if (current.includes('landscape')) {
                    screen.orientation.lock('portrait').catch(() => {});
                } else {
                    screen.orientation.lock('landscape').catch(() => {});
                }
            }
        }

        // ==================== FULLSCREEN ====================
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().then(() => {
                    isFullscreen = true;
                    body.classList.add('fullscreen');
                }).catch(() => {
                    // Fallback: simular fullscreen con CSS
                    isFullscreen = true;
                    body.classList.add('fullscreen');
                });
            } else {
                exitFullscreen();
            }
        }

        function exitFullscreen() {
            if (document.fullscreenElement) {
                document.exitFullscreen().catch(() => {});
            }
            isFullscreen = false;
            body.classList.remove('fullscreen');
        }

        // ==================== STATUS ====================
        function setStatus(msg, type = 'info') {
            statusMsg.textContent = msg;
            statusMsg.className = type === 'error' ? 'status-error' : (type === 'success' ? 'status-success' : (type === 'warning' ? 'status-warning' : 'status-info'));
        }

        function setLoading(text) {
            loadingText.textContent = text;
            loadingOverlay.style.display = 'flex';
        }

        function hideLoading() {
            loadingOverlay.style.display = 'none';
        }

        // ==================== ENUMERAR CÁMARAS ====================
        async function enumerateCameras() {
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(d => d.kind === 'videoinput');
                deviceList = videoDevices;

                cameraSelector.innerHTML = '';
                videoDevices.forEach((device, index) => {
                    const chip = document.createElement('div');
                    chip.className = 'cam-chip' + (index === 0 ? ' active' : '');
                    chip.dataset.deviceId = device.deviceId;

                    // Detectar frontal/trasera
                    let icon = '🎥';
                    let label = device.label || `Cámara ${index + 1}`;
                    if (label.toLowerCase().includes('front') || label.toLowerCase().includes('user')) {
                        icon = '🤳';
                        label = 'Frontal';
                    } else if (label.toLowerCase().includes('back') || label.toLowerCase().includes('environment') || label.toLowerCase().includes('rear')) {
                        icon = '📷';
                        label = 'Trasera';
                    }

                    chip.innerHTML = `${icon} ${label}`;
                    chip.title = device.label || 'Cámara sin nombre';
                    chip.addEventListener('click', () => switchCamera(device.deviceId));
                    cameraSelector.appendChild(chip);
                });

                if (videoDevices.length > 0) {
                    currentDeviceId = videoDevices[0].deviceId;
                }
            } catch (err) {
                console.error('Error enumerando cámaras:', err);
            }
        }

        // ==================== CAMBIAR CÁMARA ====================
        async function switchCamera(deviceId) {
            if (deviceId === currentDeviceId) return;
            currentDeviceId = deviceId;

            // Actualizar UI
            document.querySelectorAll('.cam-chip').forEach(chip => {
                chip.classList.toggle('active', chip.dataset.deviceId === deviceId);
            });

            setLoading('Cambiando cámara...');
            setStatus('🔄 Cambiando cámara...', 'warning');

            // Reiniciar cámara con nuevo deviceId
            await restartCamera(deviceId);
        }

        async function switchNextCamera() {
            if (deviceList.length <= 1) return;
            const currentIndex = deviceList.findIndex(d => d.deviceId === currentDeviceId);
            const nextIndex = (currentIndex + 1) % deviceList.length;
            await switchCamera(deviceList[nextIndex].deviceId);
        }

        // ==================== INICIAR CÁMARA ====================
        async function startCamera(deviceId = null) {
            if (currentStream) {
                currentStream.getTracks().forEach(t => t.stop());
            }

            const constraints = {
                video: {
                    width: { ideal: 1280 },
                    height: { ideal: 720 },
                    facingMode: deviceId ? undefined : 'user',
                    deviceId: deviceId ? { exact: deviceId } : undefined
                },
                audio: false
            };

            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                currentStream = stream;
                video.srcObject = stream;
                track = stream.getVideoTracks()[0];

                // Image Capture API para controles avanzados
                if (typeof ImageCapture !== 'undefined') {
                    imageCapture = new ImageCapture(track);
                    await setupCameraControls();
                }

                await video.play();
                return true;
            } catch (err) {
                console.error('Error cámara:', err);
                return false;
            }
        }

        async function restartCamera(deviceId) {
            // Detener MediaPipe temporalmente
            isModelReady = false;

            const success = await startCamera(deviceId);
            if (success) {
                // Reiniciar MediaPipe
                if (camera) {
                    camera.stop && camera.stop();
                }
                await initMediaPipe();
            } else {
                setStatus('❌ Error al cambiar cámara', 'error');
                hideLoading();
            }
        }

        // ==================== CONTROLES DE CÁMARA AVANZADOS ====================
        async function setupCameraControls() {
            if (!track) return;

            try {
                const capabilities = track.getCapabilities();
                cameraCapabilities = capabilities;

                // Zoom
                if (capabilities.zoom) {
                    zoomSlider.disabled = false;
                    zoomSlider.min = capabilities.zoom.min;
                    zoomSlider.max = capabilities.zoom.max;
                    zoomSlider.step = capabilities.zoom.step || 0.1;
                    zoomSlider.value = track.getSettings().zoom || capabilities.zoom.min;
                    document.getElementById('zoomControl').style.display = 'block';
                } else {
                    zoomSlider.disabled = true;
                    document.getElementById('zoomControl').style.display = 'none';
                }

                // ISO
                if (capabilities.iso) {
                    isoSlider.disabled = false;
                    isoSlider.min = capabilities.iso.min;
                    isoSlider.max = capabilities.iso.max;
                    isoSlider.step = capabilities.iso.step || 50;
                    isoSlider.value = track.getSettings().iso || capabilities.iso.min;
                    document.getElementById('isoControl').style.display = 'block';
                } else {
                    isoSlider.disabled = true;
                    document.getElementById('isoControl').style.display = 'none';
                }

                // Exposición
                if (capabilities.exposureCompensation) {
                    exposureSlider.disabled = false;
                    exposureSlider.min = capabilities.exposureCompensation.min;
                    exposureSlider.max = capabilities.exposureCompensation.max;
                    exposureSlider.step = capabilities.exposureCompensation.step || 0.5;
                    exposureSlider.value = track.getSettings().exposureCompensation || 0;
                    document.getElementById('exposureControl').style.display = 'block';
                } else {
                    exposureSlider.disabled = true;
                    document.getElementById('exposureControl').style.display = 'none';
                }

                // Balance de blancos
                if (capabilities.colorTemperature) {
                    wbSlider.disabled = false;
                    wbSlider.min = capabilities.colorTemperature.min;
                    wbSlider.max = capabilities.colorTemperature.max;
                    wbSlider.step = capabilities.colorTemperature.step || 100;
                    wbSlider.value = track.getSettings().colorTemperature || 4500;
                    document.getElementById('wbControl').style.display = 'block';
                } else {
                    wbSlider.disabled = true;
                    document.getElementById('wbControl').style.display = 'none';
                }

                // Brillo (solo en algunos dispositivos)
                if (capabilities.brightness) {
                    brightnessSlider.disabled = false;
                    brightnessSlider.min = capabilities.brightness.min;
                    brightnessSlider.max = capabilities.brightness.max;
                    brightnessSlider.step = capabilities.brightness.step || 1;
                    brightnessSlider.value = track.getSettings().brightness || 0;
                    document.getElementById('brightnessControl').style.display = 'block';
                } else {
                    brightnessSlider.disabled = true;
                    document.getElementById('brightnessControl').style.display = 'none';
                }

                // Contraste
                if (capabilities.contrast) {
                    contrastSlider.disabled = false;
                    contrastSlider.min = capabilities.contrast.min;
                    contrastSlider.max = capabilities.contrast.max;
                    contrastSlider.step = capabilities.contrast.step || 1;
                    contrastSlider.value = track.getSettings().contrast || 0;
                    document.getElementById('contrastControl').style.display = 'block';
                } else {
                    contrastSlider.disabled = true;
                    document.getElementById('contrastControl').style.display = 'none';
                }

                // Torch / Flash
                if (capabilities.torch) {
                    torchBtn.style.display = 'block';
                } else {
                    torchBtn.style.display = 'none';
                }

                // Focus
                if (capabilities.focusMode) {
                    focusBtn.style.display = 'block';
                    focusBtn.classList.toggle('active', track.getSettings().focusMode === 'continuous');
                } else {
                    focusBtn.style.display = 'none';
                }

            } catch (e) {
                console.warn('No se pudieron obtener capacidades de la cámara:', e);
            }
        }

        // Aplicar configuración
        async function applyConstraint(constraint, value) {
            if (!track) return;
            try {
                await track.applyConstraints({ advanced: [{ [constraint]: value }] });
            } catch (e) {
                console.warn(`No se pudo aplicar ${constraint}:`, e);
            }
        }

        zoomSlider.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            document.getElementById('zoomValue').textContent = val.toFixed(1) + 'x';
            applyConstraint('zoom', val);
        });

        isoSlider.addEventListener('input', (e) => {
            const val = parseInt(e.target.value);
            document.getElementById('isoValue').textContent = val;
            applyConstraint('iso', val);
        });

        exposureSlider.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            document.getElementById('exposureValue').textContent = (val > 0 ? '+' : '') + val;
            applyConstraint('exposureCompensation', val);
        });

        wbSlider.addEventListener('input', (e) => {
            const val = parseInt(e.target.value);
            document.getElementById('wbValue').textContent = val + 'K';
            applyConstraint('colorTemperature', val);
        });

        brightnessSlider.addEventListener('input', (e) => {
            const val = parseInt(e.target.value);
            document.getElementById('brightnessValue').textContent = val;
            applyConstraint('brightness', val);
        });

        contrastSlider.addEventListener('input', (e) => {
            const val = parseInt(e.target.value);
            document.getElementById('contrastValue').textContent = val;
            applyConstraint('contrast', val);
        });

        torchBtn.addEventListener('click', async () => {
            if (!track || !cameraCapabilities.torch) return;
            const isActive = torchBtn.classList.contains('active');
            await applyConstraint('torch', !isActive);
            torchBtn.classList.toggle('active', !isActive);
        });

        focusBtn.addEventListener('click', async () => {
            if (!track || !cameraCapabilities.focusMode) return;
            const isActive = focusBtn.classList.contains('active');
            const mode = isActive ? 'manual' : 'continuous';
            await applyConstraint('focusMode', mode);
            focusBtn.classList.toggle('active', !isActive);
        });

        // ==================== MEDIAPIPE ====================
        async function initMediaPipe() {
            setLoading('Cargando modelo de IA...');

            selfieSegmentation = new SelfieSegmentation({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}`
            });

            selfieSegmentation.setOptions({
                modelSelection: 1, // Modelo más preciso
                minDetectionConfidence: 0.7,
            });

            selfieSegmentation.onResults(drawResults);

            camera = new Camera(video, {
                onFrame: async () => {
                    if (isModelReady && selfieSegmentation) {
                        try {
                            await selfieSegmentation.send({ image: video });
                        } catch (e) {
                            console.warn("Error en frame:", e);
                        }
                    }
                },
                width: 1280,
                height: 720
            });

            await camera.start();
            isModelReady = true;
            captureBtn.disabled = false;
            mobileCaptureBtn.disabled = false;
            hideLoading();
            setStatus('🟢 Todo listo. Posiciónate frente a la cámara.', 'success');
            recordingDot.style.display = 'block';
        }

        // ==================== RENDERIZADO ====================
        function drawResults(results) {
            if (!results || !results.segmentationMask) {
                ctx.fillStyle = '#222';
                ctx.fillRect(0, 0, canvasWidth, canvasHeight);
                return;
            }

            // Guardar frame original para captura
            ctx.drawImage(video, 0, 0, canvasWidth, canvasHeight);
            lastVideoFrame = ctx.getImageData(0, 0, canvasWidth, canvasHeight);

            // Limpiar y aplicar máscara
            ctx.clearRect(0, 0, canvasWidth, canvasHeight);
            ctx.drawImage(results.segmentationMask, 0, 0, canvasWidth, canvasHeight);

            // Dibujar persona (source-in)
            ctx.globalCompositeOperation = 'source-in';
            ctx.drawImage(video, 0, 0, canvasWidth, canvasHeight);

            // Dibujar fondo (destination-over)
            ctx.globalCompositeOperation = 'destination-over';
            if (backgroundImage) {
                ctx.drawImage(backgroundImage, 0, 0, canvasWidth, canvasHeight);
            } else {
                ctx.fillStyle = bgColor;
                ctx.fillRect(0, 0, canvasWidth, canvasHeight);
            }
            ctx.globalCompositeOperation = 'source-over';

            // FPS counter
            frameCount++;
            const now = performance.now();
            if (now - lastFpsTime >= 1000) {
                fpsCounter.textContent = frameCount + ' fps';
                frameCount = 0;
                lastFpsTime = now;
            }
        }

        // ==================== FONDOS ====================
        document.querySelectorAll('.bg-color-swatch').forEach(swatch => {
            swatch.addEventListener('click', () => {
                document.querySelectorAll('.bg-color-swatch').forEach(s => s.classList.remove('active'));
                swatch.classList.add('active');
                const color = swatch.dataset.color;
                if (color === 'transparent') {
                    bgColor = 'transparent';
                } else {
                    bgColor = color;
                }
                backgroundImage = null;
                setStatus('🎨 Fondo cambiado', 'success');
            });
        });

        bgUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    backgroundImage = img;
                    document.querySelectorAll('.bg-color-swatch').forEach(s => s.classList.remove('active'));
                    setStatus('🖼️ Fondo personalizado cargado', 'success');
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        });

        // ==================== CAPTURA ====================
        function doCapture() {
            if (!lastVideoFrame) {
                setStatus('⚠️ Aún no hay imagen. Espera un momento...', 'warning');
                return;
            }

            // Original
            const origCanvas = document.createElement('canvas');
            origCanvas.width = 1280;
            origCanvas.height = 720;
            origCanvas.getContext('2d').putImageData(lastVideoFrame, 0, 0);
            const originalBlob = dataURLToBlob(origCanvas.toDataURL('image/jpeg', 0.92));

            // Editada
            const editCanvas = document.createElement('canvas');
            editCanvas.width = 1280;
            editCanvas.height = 720;
            editCanvas.getContext('2d').drawImage(canvas, 0, 0, 1280, 720);
            const editedBlob = dataURLToBlob(editCanvas.toDataURL('image/jpeg', 0.92));

            createDownload(originalBlob, dlOrig, previewOrig, 'original_720p.jpg');
            createDownload(editedBlob, dlEdit, previewEdit, 'editada_720p.jpg');

            document.getElementById('downloadSection').classList.add('show');
            setStatus('✅ ¡Captura completada!', 'success');

            // Feedback visual
            cameraWrapper.style.boxShadow = '0 0 0 4px var(--success)';
            setTimeout(() => cameraWrapper.style.boxShadow = '', 300);
        }

        captureBtn.addEventListener('click', doCapture);
        mobileCaptureBtn.addEventListener('click', doCapture);

        const previewOrig = document.getElementById('previewOriginal');
        const previewEdit = document.getElementById('previewEdited');
        const dlOrig = document.getElementById('downloadOriginal');
        const dlEdit = document.getElementById('downloadEdited');

        function dataURLToBlob(dataURL) {
            const parts = dataURL.split(';base64,');
            const raw = atob(parts[1]);
            const uInt8Array = new Uint8Array(raw.length);
            for (let i = 0; i < raw.length; ++i) uInt8Array[i] = raw.charCodeAt(i);
            return new Blob([uInt8Array], { type: parts[0].split(':')[1] });
        }

        function createDownload(blob, anchorElement, imgPreview, filename) {
            const url = URL.createObjectURL(blob);
            anchorElement.href = url;
            anchorElement.download = filename;
            imgPreview.src = url;
        }

        // ==================== EVENTOS UI ====================
        fullscreenBtn.addEventListener('click', toggleFullscreen);
        exitFsBtn.addEventListener('click', exitFullscreen);
        rotateBtn.addEventListener('click', toggleOrientation);
        mobileSwitchCam.addEventListener('click', switchNextCamera);

        // Sidebar móvil
        sidebarHandle.addEventListener('click', () => {
            sidebar.classList.toggle('open');
        });

        mobileSettingsBtn.addEventListener('click', () => {
            sidebar.classList.toggle('open');
        });

        mobileBgBtn.addEventListener('click', () => {
            sidebar.classList.add('open');
            // Scroll a sección de fondo
            const bgSection = document.querySelector('.section:nth-child(3)');
            if (bgSection) bgSection.scrollIntoView({ behavior: 'smooth' });
        });

        // Cerrar sidebar al tocar fuera (móvil)
        document.addEventListener('click', (e) => {
            if (isMobile && sidebar.classList.contains('open')) {
                if (!sidebar.contains(e.target) && !mobileSettingsBtn.contains(e.target) && !mobileBgBtn.contains(e.target)) {
                    sidebar.classList.remove('open');
                }
            }
        });

        // ==================== INICIALIZACIÓN ====================
        async function init() {
            detectDevice();

            // Validación de seguridad
            if (!window.isSecureContext && window.location.hostname !== 'localhost') {
                setStatus('❌ ERROR: Se requiere HTTPS para acceder a la cámara. Sube a GitHub Pages o usa ngrok.', 'error');
                hideLoading();
                return;
            }

            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                setStatus('❌ ERROR: Tu navegador no soporta acceso a cámara.', 'error');
                hideLoading();
                return;
            }

            setStatus('⏳ Solicitando permisos...');

            // Enumerar cámaras
            await enumerateCameras();

            // Iniciar cámara
            const camSuccess = await startCamera();
            if (!camSuccess) {
                setStatus('❌ No se pudo acceder a la cámara. Verifica los permisos.', 'error');
                hideLoading();
                return;
            }

            // Iniciar MediaPipe
            await initMediaPipe();
        }

        init();

        // Manejar cambio de orientación
        window.addEventListener('orientationchange', () => {
            setTimeout(() => {
                if (isMobile) {
                    // Reajustar canvas si es necesario
                    const isLandscapeNow = Math.abs(window.orientation) === 90;
                    isLandscape = isLandscapeNow;
                }
            }, 300);
        });
    </script>
</body>
</html>
